version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
  #    volumes:
  #      - pgdata:/var/lib/postgresql/data

  fetcher:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
#    volumes:
#      - ./logs:/app/logs
